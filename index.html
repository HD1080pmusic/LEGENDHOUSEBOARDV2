<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi Lifestyle App</title>
    <style>
        /* ==========================================================================
           CHAO PET STYLES (Added cleanly without changing your original layout)
           ========================================================================== */
        .pet-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 280px;
            margin: 20px auto;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .pet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f4f8;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
        }

        .chao-pet {
            width: 96px;
            height: 96px;
            /* Ensures your pixel art looks perfectly crisp and not blurry */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transition: transform 0.2s ease;
        }

        .chao-idle {
            animation: chaoFloat 2s ease-in-out infinite;
        }

        .chao-eating {
            animation: chaoChew 0.3s ease infinite;
        }

        @keyframes chaoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes chaoChew {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1, 0.9); }
        }

        .stat-label {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
            margin-top: 8px;
        }

        .stat-bar {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 9999px;
            margin: 4px 0 8px 0;
            overflow: hidden;
            height: 10px;
        }

        .stat-fill {
            height: 100%;
            width: 50%;
            border-radius: 9999px;
            transition: width 0.3s ease;
        }

        #hunger-fill { background-color: #10b981; }
        #happiness-fill { background-color: #3b82f6; }

        .pet-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .pet-buttons button {
            flex: 1;
            padding: 8px 0;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid #333;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 0 #333;
            transition: all 0.1s ease;
        }

        .pet-buttons button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #333;
        }
    </style>
</head>
<body>

    <div class="pet-card">
        <h3 style="margin: 0 0 10px 0; color: #1f2937;">Chao Companion</h3>
        <div class="pet-container">
            <img id="chaoPet" class="chao-pet chao-idle" src="image_4f22e2.png" alt="Chao Pet">
            
            <div style="width: 100%;">
                <div class="stat-label">Fullness: <span id="hunger-val">50</span>%</div>
                <div class="stat-bar"><div id="hunger-fill" class="stat-fill"></div></div>
                
                <div class="stat-label">Happiness: <span id="happiness-val">50</span>%</div>
                <div class="stat-bar"><div id="happiness-fill" class="stat-fill"></div></div>
            </div>

            <div class="pet-buttons">
                <button id="feedBtn">🍎 Feed</button>
                <button id="petBtn">❤️ Pet</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const chao = document.getElementById("chaoPet");
        const feedBtn = document.getElementById("feedBtn");
        const petBtn = document.getElementById("petBtn");

        let hunger = 50;
        let happiness = 50;

        function updateDisplay() {
            hunger = Math.max(0, Math.min(100, hunger));
            happiness = Math.max(0, Math.min(100, happiness));

            document.getElementById("hunger-val").innerText = hunger;
            document.getElementById("happiness-val").innerText = happiness;

            document.getElementById("hunger-fill").style.width = hunger + "%";
            document.getElementById("happiness-fill").style.width = happiness + "%";
        }

        // Action: Feed
        feedBtn.addEventListener("click", () => {
            hunger = hunger + 15;
            updateDisplay();

            chao.classList.remove("chao-idle");
            chao.classList.add("chao-eating");
            
            // IMPORTANT: Change to your local eating image file name if needed
            chao.src = "image_4f2302.png"; 

            setTimeout(() => {
                chao.classList.remove("chao-eating");
                chao.classList.add("chao-idle");
                // Returns back to standard idle image
                chao.src = "image_4f22e2.png"; 
            }, 1200);
        });

        // Action: Pet
        petBtn.addEventListener("click", () => {
            happiness = happiness + 15;
            updateDisplay();

            chao.style.transform = "scale(1.2) translateY(-10px)";
            setTimeout(() => {
                chao.style.transform = "";
            }, 200);
        });

        // Passive environmental decay (stats drop slightly every 10 seconds)
        setInterval(() => {
            hunger = hunger - 2;
            happiness = happiness - 1;
            updateDisplay();
        }, 10000);
        
        // Run initial configuration alignment
        updateDisplay();
    });
    </script>

</body>
</html>
